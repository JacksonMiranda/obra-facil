# CI/CD — Obra Fácil
# Jobs paralelos: quality (lint+typecheck) | unit-tests (jest+vitest+e2e-backend)
# Build + Playwright só depois dos dois passarem, e apenas em push (não em PRs).

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Lint & Typecheck  (sem DB, rápido)
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  quality:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Instalar dependências
        run: npm ci

      - name: Compilar pacote shared
        run: npm run build --workspace=@obrafacil/shared

      - name: Lint backend
        run: npm run lint:backend

      - name: Lint frontend
        run: npm run lint:frontend

      - name: Typecheck backend
        run: npx tsc --noEmit
        working-directory: apps/backend

      - name: Typecheck frontend
        run: npx tsc --noEmit
        working-directory: apps/frontend
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_placeholder
          NEXT_PUBLIC_API_URL: 'http://localhost:3001/api'
          NEXT_PUBLIC_DISABLE_CLERK_AUTH: 'true'

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — Testes unitários + e2e backend  (roda em paralelo com quality)
# ─────────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: obrafacil_db
          POSTGRES_USER: obrafacil_user
          POSTGRES_PASSWORD: obrafacil_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U obrafacil_user -d obrafacil_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Instalar dependências
        run: npm ci

      - name: Compilar pacote shared
        run: npm run build --workspace=@obrafacil/shared

      - name: Aplicar schema e seed no Postgres
        run: |
          PG="PGPASSWORD=obrafacil_pass psql -h localhost -U obrafacil_user -d obrafacil_db"
          eval "$PG -f docker/01-schema.sql"
          eval "$PG -f docker/02-seed.sql"
          eval "$PG -f docker/03-account-roles.sql"
          eval "$PG -f docker/04-rls.sql"
          eval "$PG -f docker/05-professional-visibility.sql"
          eval "$PG -f docker/06-rejection-reason.sql"
          eval "$PG -f docker/06-notifications.sql"
          eval "$PG -f docker/07-fix-profile-full-name.sql"
          eval "$PG -f docker/07-professionals-unique.sql"
          eval "$PG -f docker/08-avatar-id.sql"
          eval "$PG -f docker/08-visits-structured-fields.sql"
          eval "$PG -f docker/09-reviews-work-id.sql"
          eval "$PG -f docker/09-professional-services.sql"

      - name: Testes unitários backend (Jest)
        run: npm test --workspace=backend

      - name: Testes unitários frontend (Vitest)
        run: npm test --workspace=frontend
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_placeholder
          NEXT_PUBLIC_API_URL: 'http://localhost:3001/api'
          NEXT_PUBLIC_DISABLE_CLERK_AUTH: 'true'

      - name: Testes e2e backend (isolamento de pedidos)
        run: npm run test:e2e --workspace=backend
        env:
          DATABASE_URL: postgres://obrafacil_user:obrafacil_pass@localhost:5432/obrafacil_db
          DISABLE_CLERK_AUTH: 'true'

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3 — Build + Playwright  (depende de quality + unit-tests)
#          Playwright só roda em push (não em PRs) para economizar tempo.
# ─────────────────────────────────────────────────────────────────────────────
  build-and-e2e:
    name: Build & E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [quality, unit-tests]

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: obrafacil_db
          POSTGRES_USER: obrafacil_user
          POSTGRES_PASSWORD: obrafacil_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U obrafacil_user -d obrafacil_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Instalar dependências
        run: npm ci

      - name: Compilar pacote shared
        run: npm run build --workspace=@obrafacil/shared

      - name: Build backend
        run: npm run build:backend

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: apps/frontend/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('apps/frontend/**/*.ts', 'apps/frontend/**/*.tsx', 'apps/frontend/package.json') }}
          restore-keys: nextjs-${{ runner.os }}-

      - name: Build frontend
        run: npm run build:frontend
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_API_URL: 'http://localhost:3001/api'
          NEXT_PUBLIC_DISABLE_CLERK_AUTH: 'true'
          DISABLE_CLERK_AUTH: 'true'

      - name: Auditoria de segurança
        run: npm audit --audit-level=critical
        continue-on-error: true

      - name: Aplicar schema e seed no Postgres
        if: github.event_name == 'push'
        run: |
          PG="PGPASSWORD=obrafacil_pass psql -h localhost -U obrafacil_user -d obrafacil_db"
          eval "$PG -f docker/01-schema.sql"
          eval "$PG -f docker/02-seed.sql"
          eval "$PG -f docker/03-account-roles.sql"
          eval "$PG -f docker/04-rls.sql"
          eval "$PG -f docker/05-professional-visibility.sql"
          eval "$PG -f docker/06-rejection-reason.sql"
          eval "$PG -f docker/06-notifications.sql"
          eval "$PG -f docker/07-fix-profile-full-name.sql"
          eval "$PG -f docker/07-professionals-unique.sql"
          eval "$PG -f docker/08-avatar-id.sql"
          eval "$PG -f docker/08-visits-structured-fields.sql"
          eval "$PG -f docker/09-reviews-work-id.sql"
          eval "$PG -f docker/09-professional-services.sql"
          eval "$PG -f docker/10-fix-jobs-completed-trigger.sql"

      - name: Cache Playwright browsers
        if: github.event_name == 'push'
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('apps/frontend/package.json') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Instalar browser do Playwright
        if: github.event_name == 'push'
        run: npx --workspace=frontend playwright install --with-deps chromium

      - name: Testes e2e frontend (Playwright)
        if: github.event_name == 'push'
        timeout-minutes: 12
        env:
          E2E_BYPASS_USER: demo_client_001
        run: |
          DATABASE_URL="postgres://obrafacil_user:obrafacil_pass@localhost:5432/obrafacil_db" \
            DISABLE_CLERK_AUTH=true \
            PORT=3001 \
            node apps/backend/dist/main.js &
          BACKEND_PID=$!
          NEXT_PUBLIC_API_URL="http://localhost:3001/api" \
            NEXT_PUBLIC_DISABLE_CLERK_AUTH=true \
            NEXT_PUBLIC_BYPASS_USER_CLERK_ID=demo_client_001 \
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=pk_test_placeholder \
            npm run start --workspace=frontend &
          FRONTEND_PID=$!
          npx wait-on http://localhost:3001/api/health http://localhost:3000 -t 60000
          npm run test:e2e --workspace=frontend
          kill $BACKEND_PID $FRONTEND_PID || true
