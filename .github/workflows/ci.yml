# CI/CD — Obra Fácil
# Roda em todo push/PR: lint + typecheck + build + security audit
# Deploy no Vercel é feito automaticamente pelo Vercel GitHub App (push em main → deploy)

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    name: Lint, Typecheck & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Instalar dependências
        run: npm ci

      - name: Compilar pacote shared
        run: npm run build --workspace=@obrafacil/shared

      - name: Lint backend
        run: npm run lint:backend

      - name: Lint frontend
        run: npm run lint:frontend

      - name: Typecheck frontend
        run: npx tsc --noEmit
        working-directory: apps/frontend

      - name: Typecheck backend
        run: npx tsc --noEmit
        working-directory: apps/backend

      - name: Build frontend
        run: npm run build:frontend
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_API_URL: 'http://localhost:3001/api'
          NEXT_PUBLIC_DISABLE_CLERK_AUTH: 'true'

      - name: Build backend
        run: npm run build:backend

      - name: Auditoria de segurança
        run: npm audit --audit-level=high
        continue-on-error: true
