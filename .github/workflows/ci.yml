# CI/CD — Obra Fácil
# Roda em todo push/PR: lint + typecheck + build + security audit
# Deploy no Vercel é feito automaticamente pelo Vercel GitHub App (push em main → deploy)

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    name: Lint, Typecheck, Test & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: obrafacil_db
          POSTGRES_USER: obrafacil_user
          POSTGRES_PASSWORD: obrafacil_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U obrafacil_user -d obrafacil_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Instalar dependências
        run: npm ci

      - name: Compilar pacote shared
        run: npm run build --workspace=@obrafacil/shared

      - name: Lint backend
        run: npm run lint:backend

      - name: Lint frontend
        run: npm run lint:frontend

      - name: Typecheck backend
        run: npx tsc --noEmit
        working-directory: apps/backend

      - name: Typecheck frontend
        # shared precisa estar buildado para os tipos resolverem
        run: npx tsc --noEmit
        working-directory: apps/frontend
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_placeholder
          NEXT_PUBLIC_API_URL: 'http://localhost:3001/api'
          NEXT_PUBLIC_DISABLE_CLERK_AUTH: 'true'

      - name: Aplicar schema e seed no Postgres
        run: |
          PG="PGPASSWORD=obrafacil_pass psql -h localhost -U obrafacil_user -d obrafacil_db"
          # ORDEM CRÍTICA:
          # 1. Schema base (cria tabelas)
          # 2. Seed DATA (insere profiles/professionals antes dos backfills)
          # 3. Migrations que fazem backfill (precisam dos dados do seed)
          eval "$PG -f docker/01-schema.sql"
          eval "$PG -f docker/02-seed.sql"
          eval "$PG -f docker/03-account-roles.sql"
          eval "$PG -f docker/04-rls.sql"
          eval "$PG -f docker/05-professional-visibility.sql"
          eval "$PG -f docker/06-rejection-reason.sql"
          eval "$PG -f docker/06-notifications.sql"
          eval "$PG -f docker/07-fix-profile-full-name.sql"
          eval "$PG -f docker/07-professionals-unique.sql"
          eval "$PG -f docker/08-avatar-id.sql"
          eval "$PG -f docker/08-visits-structured-fields.sql"
          eval "$PG -f docker/09-reviews-work-id.sql"

      - name: Testes unitários backend (Jest)
        run: npm test --workspace=backend

      - name: Testes unitários frontend (Vitest)
        run: npm test --workspace=frontend
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_placeholder
          NEXT_PUBLIC_API_URL: 'http://localhost:3001/api'
          NEXT_PUBLIC_DISABLE_CLERK_AUTH: 'true'

      - name: Testes e2e backend (isolamento de pedidos)
        run: npm run test:e2e --workspace=backend
        env:
          DATABASE_URL: postgres://obrafacil_user:obrafacil_pass@localhost:5432/obrafacil_db
          DISABLE_CLERK_AUTH: 'true'

      - name: Build backend
        run: npm run build:backend

      - name: Build frontend
        run: npm run build:frontend
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_API_URL: 'http://localhost:3001/api'
          NEXT_PUBLIC_DISABLE_CLERK_AUTH: 'true'
          DISABLE_CLERK_AUTH: 'true'

      - name: Instalar browser do Playwright
        run: npx --workspace=frontend playwright install --with-deps chromium

      - name: Testes e2e frontend (Playwright)
        run: |
          # Sobe backend (dist) e frontend em background, roda Playwright, derruba.
          DATABASE_URL="postgres://obrafacil_user:obrafacil_pass@localhost:5432/obrafacil_db" \
            DISABLE_CLERK_AUTH=true \
            PORT=3001 \
            node apps/backend/dist/main.js &
          BACKEND_PID=$!
          NEXT_PUBLIC_API_URL="http://localhost:3001/api" \
            NEXT_PUBLIC_DISABLE_CLERK_AUTH=true \
            NEXT_PUBLIC_BYPASS_USER_CLERK_ID=demo_client_001 \
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=pk_test_placeholder \
            npm run start --workspace=frontend &
          FRONTEND_PID=$!
          npx wait-on http://localhost:3001/api/health http://localhost:3000 -t 60000
          npm run test:e2e --workspace=frontend
          kill $BACKEND_PID $FRONTEND_PID || true

      - name: Auditoria de segurança
        run: npm audit --audit-level=critical
        continue-on-error: true
