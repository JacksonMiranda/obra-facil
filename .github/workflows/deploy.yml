name: CI/CD Pipeline - Qualidade e Deploy

on:
  push:
    branches:
      - main

env:
  # O Vercel CLI precisa dessas variáveis de ambiente expostas para vincular o projeto localmente
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  quality:
    name: 🧪 Quality Checks (Lint & Test)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x] # Node.js versão LTS (Iron)
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci
        
      - name: Run Linter
        run: npm run lint
        
      - name: Run Tests (Unit & Integration)
        run: npm test

  deploy:
    name: 🚀 Production Deploy (Vercel)
    needs: quality # Interrompe o workflow e bloqueia o deploy caso haja falha no job "quality"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Configuration
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        # Builda os artefatos respeitando o VERCEL_PROJECT_ID fornecido (geralmente lida com Monorepo por default)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Project to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  notify:
    name: 📢 Status Notification
    needs: [quality, deploy]
    # O always() garante que a notificação rode mesmo se um step falhar
    if: always() 
    runs-on: ubuntu-latest
    steps:
      - name: Send Summary
        run: |
          echo "## Status do Pipeline de CD/CD 🚀" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.quality.result }}" = "success" ] && [ "${{ needs.deploy.result }}" = "success" ]; then
            echo "✅ **Sucesso!** Código passou na qualidade e foi deployado em Produção." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Falha.** O Pipeline encontrou erros. Verifique os logs do GitHub Actions." >> $GITHUB_STEP_SUMMARY
          fi
