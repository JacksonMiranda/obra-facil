
name: CI — Qualidade (Lint & Test)

on:
  push:
    branches:
      - main
  workflow_dispatch: # Permite disparar manualmente

jobs:
  quality-backend:
    name: Qualidade backend (Lint & Test)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout do Repositório
        uses: actions/checkout@v4

      - name: Instalação do Node.js com Cache
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Instalar Dependências
        run: npm ci

      - name: Executar Linter
        run: npm run lint
        working-directory: apps/backend

  quality-frontend:
    name: Qualidade frontend (Lint & Test)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout do Repositório
        uses: actions/checkout@v4

      - name: Instalação do Node.js com Cache
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Instalar Dependências
        run: npm ci

      - name: Executar Linter
        run: npm run lint
        working-directory: apps/frontend
