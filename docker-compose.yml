services:
  db:
    image: postgres:17-alpine
    container_name: obrafacil-db
    restart: always
    environment:
      POSTGRES_DB: obrafacil_db
      POSTGRES_USER: obrafacil_user
      POSTGRES_PASSWORD: obrafacil_pass
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U obrafacil_user -d obrafacil_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: obrafacil-backend
    restart: always
    environment:
      PORT: ${PORT:-3001}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      # NODE_ENV defaults to "development" so main.ts's production-safety guard
      # does not refuse to boot when DISABLE_CLERK_AUTH=true.
      NODE_ENV: ${NODE_ENV:-development}
      DISABLE_CLERK_AUTH: ${DISABLE_CLERK_AUTH:-true}
      DATABASE_URL: ${DATABASE_URL:-postgres://obrafacil_user:obrafacil_pass@db:5432/obrafacil_db}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-dummy}
      CLERK_WEBHOOK_SECRET: ${CLERK_WEBHOOK_SECRET:-dummy}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${PORT:-3001}/api/docs || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api}
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-dummy}
        NEXT_PUBLIC_DISABLE_CLERK_AUTH: "true"
    container_name: obrafacil-frontend
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api}
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://backend:3001/api}
      NEXT_PUBLIC_DISABLE_CLERK_AUTH: "true"
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-dummy}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-dummy}
    ports:
      - "3000:3000"
    command: ["sh", "-c", "cd /app/apps/frontend && node /app/node_modules/.bin/next start -H 0.0.0.0 -p 3000"]
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  pgdata:
